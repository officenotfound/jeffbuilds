<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1200px; height: 630px; }
  body {
    background: #0b0b0b;
    font-family: Menlo, Monaco, monospace;
    overflow: hidden;
    position: relative;
  }
  .glow {
    position: absolute; top: -180px; left: 50%; transform: translateX(-50%);
    width: 1080px; height: 600px;
    background: radial-gradient(ellipse at center, rgba(77,159,255,0.10), transparent 70%);
  }
  .term {
    position: absolute; top: 150px; left: 180px;
    width: 840px; height: 300px;
    background: #0f0f0f; border: 1.5px solid #242424; border-radius: 14px;
    overflow: hidden;
    box-shadow: 0 40px 120px rgba(0,0,0,0.6), 0 0 80px rgba(77,159,255,0.05);
  }
  .bar { height: 46px; background: #131313; border-bottom: 1px solid #242424; display: flex; align-items: center; padding: 0 18px; gap: 9px; }
  .dot { width: 13px; height: 13px; border-radius: 50%; }
  .r { background: #ff5f57; } .y { background: #ffbd2e; } .g { background: #28c840; }
  .bar .title { margin-left: auto; font-size: 14px; color: #5a5550; }
  .body { padding: 26px 30px; font-size: 21px; line-height: 1.9; }
  .prompt { color: #4ade80; }
  .cmd { color: #e2dbd0; }
  .out { color: #4d9fff; font-style: italic; }
  .mark {
    position: absolute; bottom: 70px; left: 0; right: 0; text-align: center;
    font-size: 40px; font-weight: 700; color: #e2dbd0; letter-spacing: -0.5px;
  }
  .mark .u { color: #4d9fff; }
</style>
</head>
<body>
  <div class="glow"></div>
  <div class="term">
    <div class="bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="title">jeffrey@jeffbuilds ~ zsh</span></div>
    <div class="body">
      <div><span class="prompt">$ </span><span class="cmd">whoami</span></div>
      <div class="out">jeff. nomad by choice, builder by nature, curious by default.</div>
      <div><span class="prompt">$ </span><span class="cmd">cat why.txt</span></div>
      <div class="out">the day job pays the bills. this is what i actually love.</div>
    </div>
  </div>
  <div class="mark">jeffbuilds<span class="u">_</span></div>
</body>
</html>
